services:
  postgres:
    image: postgres:18-alpine
    container_name: hearthly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hearthly}
      POSTGRES_USER: ${POSTGRES_USER:-hearthly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hearthly_local}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hearthly}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
