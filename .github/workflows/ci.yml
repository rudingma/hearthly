name: CI

on:
  pull_request:
    branches: [main]

env:
  NX_IGNORE_UNSUPPORTED_TS_SETUP: 'true'

permissions:
  actions: read
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
          cache: true

      - run: bun install --frozen-lockfile

      - uses: nrwl/nx-set-shas@v5

      - name: Lint affected
        run: npx nx affected --target=lint

      - name: Prettier check
        run: bun run format:check

      - name: Typecheck affected
        run: npx nx affected --target=typecheck

      - name: Test affected
        run: npx nx affected --target=test

      - name: Build affected
        run: npx nx affected --target=build

      # Dependency audit handled by Trivy in deploy pipeline

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
          cache: true

      - run: bun install --frozen-lockfile

      - uses: nrwl/nx-set-shas@v5

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: E2E (axe + visual snapshots)
        run: npx nx e2e hearthly-app-e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dist/.playwright/apps/hearthly-app-e2e
          retention-days: 14
