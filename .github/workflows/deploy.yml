name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "infrastructure/**"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

permissions:
  contents: write
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'apps/hearthly-api/**'
              - 'package-lock.json'
            app:
              - 'apps/hearthly-app/**'
              - 'package-lock.json'

  build-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (local)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/hearthly-api/deploy/Dockerfile
          load: true
          push: false
          tags: |
            ${{ env.IMAGE_PREFIX }}/hearthly-api:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/hearthly-api:latest
          cache-from: type=gha,scope=hearthly-api
          cache-to: type=gha,scope=hearthly-api,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        env:
          TRIVY_PLATFORM: linux/arm64
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/hearthly-api:sha-${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Push
        run: |
          docker push ${{ env.IMAGE_PREFIX }}/hearthly-api:sha-${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}/hearthly-api:latest

  build-app:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (local)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/hearthly-app/deploy/Dockerfile
          load: true
          push: false
          tags: |
            ${{ env.IMAGE_PREFIX }}/hearthly-app:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/hearthly-app:latest
          cache-from: type=gha,scope=hearthly-app
          cache-to: type=gha,scope=hearthly-app,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        env:
          TRIVY_PLATFORM: linux/arm64
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/hearthly-app:sha-${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Push
        run: |
          docker push ${{ env.IMAGE_PREFIX }}/hearthly-app:sha-${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}/hearthly-app:latest

  update-tags:
    needs: [changes, build-api, build-app]
    if: always() && (needs.build-api.result == 'success' || needs.build-app.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Update image tags
        run: |
          TAG="sha-${{ github.sha }}"
          if [ "${{ needs.changes.outputs.api }}" = "true" ] && [ "${{ needs.build-api.result }}" = "success" ]; then
            sed -i "s|^\(\s*\)tag:.*|\\1tag: ${TAG}|" apps/hearthly-api/deploy/chart/values.yaml
          fi
          if [ "${{ needs.changes.outputs.app }}" = "true" ] && [ "${{ needs.build-app.result }}" = "success" ]; then
            sed -i "s|^\(\s*\)tag:.*|\\1tag: ${TAG}|" apps/hearthly-app/deploy/chart/values.yaml
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/*/deploy/chart/values.yaml
          git diff --cached --quiet || git commit -m "deploy: update image tags to sha-${{ github.sha }}"
          git push
