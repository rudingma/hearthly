name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      force_keycloak:
        description: "Force Keycloak rebuild"
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

permissions:
  contents: write
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      app: ${{ steps.filter.outputs.app }}
      keycloak: ${{ steps.filter.outputs.keycloak }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'apps/hearthly-api/**'
              - 'package-lock.json'
            app:
              - 'apps/hearthly-app/**'
              - 'package-lock.json'
            keycloak:
              - 'infrastructure/cluster-services/keycloak/deploy/**'

  build-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (local)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/hearthly-api/deploy/Dockerfile
          load: true
          push: false
          tags: |
            ${{ env.IMAGE_PREFIX }}/hearthly-api:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/hearthly-api:latest
          cache-from: type=gha,scope=hearthly-api
          cache-to: type=gha,scope=hearthly-api,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        env:
          TRIVY_PLATFORM: linux/arm64
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/hearthly-api:sha-${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Push
        run: |
          docker push ${{ env.IMAGE_PREFIX }}/hearthly-api:sha-${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}/hearthly-api:latest

  build-app:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (local)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/hearthly-app/deploy/Dockerfile
          load: true
          push: false
          tags: |
            ${{ env.IMAGE_PREFIX }}/hearthly-app:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/hearthly-app:latest
          cache-from: type=gha,scope=hearthly-app
          cache-to: type=gha,scope=hearthly-app,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        env:
          TRIVY_PLATFORM: linux/arm64
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/hearthly-app:sha-${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Push
        run: |
          docker push ${{ env.IMAGE_PREFIX }}/hearthly-app:sha-${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}/hearthly-app:latest

  build-keycloak:
    needs: changes
    if: needs.changes.outputs.keycloak == 'true' || inputs.force_keycloak == true
    runs-on: ubuntu-24.04-arm
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Keycloak version from Dockerfile
        id: version
        run: |
          KC_VERSION=$(grep 'FROM quay.io/keycloak/keycloak:' infrastructure/cluster-services/keycloak/deploy/Dockerfile | head -1 | sed 's/.*keycloak:\([^ ]*\).*/\1/')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${KC_VERSION}-sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build (local)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infrastructure/cluster-services/keycloak/deploy/Dockerfile
          load: true
          push: false
          tags: |
            ${{ env.IMAGE_PREFIX }}/hearthly-keycloak:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/hearthly-keycloak:latest
          cache-from: type=gha,scope=hearthly-keycloak
          cache-to: type=gha,scope=hearthly-keycloak,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        env:
          TRIVY_PLATFORM: linux/arm64
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/hearthly-keycloak:${{ steps.version.outputs.tag }}
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Push
        run: |
          docker push ${{ env.IMAGE_PREFIX }}/hearthly-keycloak:${{ steps.version.outputs.tag }}
          docker push ${{ env.IMAGE_PREFIX }}/hearthly-keycloak:latest

  update-tags:
    needs: [changes, build-api, build-app, build-keycloak]
    if: always() && (needs.build-api.result == 'success' || needs.build-app.result == 'success' || needs.build-keycloak.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Pull latest
        run: git pull --rebase origin main

      - name: Update image tags
        run: |
          if [ "${{ needs.changes.outputs.api }}" = "true" ] && [ "${{ needs.build-api.result }}" = "success" ]; then
            sed -i "s|^\(\s*\)tag:.*|\\1tag: sha-${{ github.sha }}|" apps/hearthly-api/deploy/chart/values.yaml
          fi
          if [ "${{ needs.changes.outputs.app }}" = "true" ] && [ "${{ needs.build-app.result }}" = "success" ]; then
            sed -i "s|^\(\s*\)tag:.*|\\1tag: sha-${{ github.sha }}|" apps/hearthly-app/deploy/chart/values.yaml
          fi
          if [ "${{ needs.build-keycloak.result }}" = "success" ]; then
            sed -i "s|^\(\s*\)tag:.*|\\1tag: \"${{ needs.build-keycloak.outputs.tag }}\"|" infrastructure/cluster-services/keycloak/values.yaml
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/*/deploy/chart/values.yaml infrastructure/cluster-services/keycloak/values.yaml
          git diff --cached --quiet && exit 0
          git commit -m "deploy: update image tags to ${{ github.sha }}"
          for i in 1 2 3; do
            git push && break
            echo "Push failed, retrying after rebase..."
            git pull --rebase origin main
          done
