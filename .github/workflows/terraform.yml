name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/cluster/**/*.tf'
      - 'infrastructure/keycloak-config/**/*.tf'
  push:
    branches: [main]
    paths:
      - 'infrastructure/cluster/**/*.tf'
      - 'infrastructure/keycloak-config/**/*.tf'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  INFISICAL_IDENTITY_ID: '2a105da8-c31f-4244-b1f0-a72d5379bf4f'
  INFISICAL_DOMAIN: 'https://secrets.hearthly.dev'
  INFISICAL_PROJECT_SLUG: 'hearthly-uv-ci'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      cluster: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.cluster }}
      keycloak-config: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.keycloak-config }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        if: github.event_name != 'workflow_dispatch'
        id: filter
        with:
          filters: |
            cluster:
              - 'infrastructure/cluster/**/*.tf'
            keycloak-config:
              - 'infrastructure/keycloak-config/**/*.tf'

  # --- Cluster module ---
  plan-cluster:
    needs: changes
    if: needs.changes.outputs.cluster == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-cluster
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: 'oidc'
          identity-id: ${{ env.INFISICAL_IDENTITY_ID }}
          domain: ${{ env.INFISICAL_DOMAIN }}
          env-slug: 'prod'
          project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}
          secret-path: '/'

      - name: Configure backend
        working-directory: infrastructure/cluster
        run: |
          cat > backend.conf <<EOF
          access_key = "$S3_ACCESS_KEY"
          secret_key = "$S3_SECRET_KEY"
          EOF
          sed -i 's/^ *//' backend.conf

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printenv HCLOUD_SSH_PRIVATE_KEY > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub

      - name: Terraform init
        working-directory: infrastructure/cluster
        run: terraform init -backend-config=backend.conf

      - name: Terraform plan
        id: plan
        working-directory: infrastructure/cluster
        run: terraform plan -input=false -no-color -out=tfplan
        env:
          TF_VAR_hcloud_token: ${{ env.HCLOUD_TOKEN }}

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            let plan = `${{ steps.plan.outputs.stdout }}`;
            if (plan.length > 60000) plan = plan.substring(0, 60000) + '\n... (truncated)';
            const output = `#### Terraform Plan — \`infrastructure/cluster\`\n\`\`\`\n${plan}\n\`\`\`\n*Triggered by @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  apply-cluster:
    needs: [changes, plan-cluster]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.cluster == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-cluster
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: 'oidc'
          identity-id: ${{ env.INFISICAL_IDENTITY_ID }}
          domain: ${{ env.INFISICAL_DOMAIN }}
          env-slug: 'prod'
          project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}
          secret-path: '/'

      - name: Configure backend
        working-directory: infrastructure/cluster
        run: |
          cat > backend.conf <<EOF
          access_key = "$S3_ACCESS_KEY"
          secret_key = "$S3_SECRET_KEY"
          EOF
          sed -i 's/^ *//' backend.conf

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printenv HCLOUD_SSH_PRIVATE_KEY > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub

      - name: Terraform init
        working-directory: infrastructure/cluster
        run: terraform init -backend-config=backend.conf

      - name: Terraform apply
        working-directory: infrastructure/cluster
        run: terraform apply -input=false -auto-approve
        env:
          TF_VAR_hcloud_token: ${{ env.HCLOUD_TOKEN }}

  # --- Keycloak config module ---
  plan-keycloak-config:
    needs: changes
    if: needs.changes.outputs.keycloak-config == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-keycloak-config
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: 'oidc'
          identity-id: ${{ env.INFISICAL_IDENTITY_ID }}
          domain: ${{ env.INFISICAL_DOMAIN }}
          env-slug: 'prod'
          project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}
          secret-path: '/'

      - name: Configure backend
        working-directory: infrastructure/keycloak-config
        run: |
          cat > backend.conf <<EOF
          access_key = "$S3_ACCESS_KEY"
          secret_key = "$S3_SECRET_KEY"
          EOF
          sed -i 's/^ *//' backend.conf

      - name: Terraform init
        working-directory: infrastructure/keycloak-config
        run: terraform init -backend-config=backend.conf

      - name: Terraform plan
        id: plan
        working-directory: infrastructure/keycloak-config
        run: terraform plan -input=false -no-color -out=tfplan
        env:
          TF_VAR_keycloak_admin_password: ${{ env.KEYCLOAK_ADMIN_PASSWORD }}
          TF_VAR_google_client_id: ${{ env.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ env.GOOGLE_CLIENT_SECRET }}

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            let plan = `${{ steps.plan.outputs.stdout }}`;
            if (plan.length > 60000) plan = plan.substring(0, 60000) + '\n... (truncated)';
            const output = `#### Terraform Plan — \`infrastructure/keycloak-config\`\n\`\`\`\n${plan}\n\`\`\`\n*Triggered by @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  apply-keycloak-config:
    needs: [changes, plan-keycloak-config]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.keycloak-config == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-keycloak-config
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: 'oidc'
          identity-id: ${{ env.INFISICAL_IDENTITY_ID }}
          domain: ${{ env.INFISICAL_DOMAIN }}
          env-slug: 'prod'
          project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}
          secret-path: '/'

      - name: Configure backend
        working-directory: infrastructure/keycloak-config
        run: |
          cat > backend.conf <<EOF
          access_key = "$S3_ACCESS_KEY"
          secret_key = "$S3_SECRET_KEY"
          EOF
          sed -i 's/^ *//' backend.conf

      - name: Terraform init
        working-directory: infrastructure/keycloak-config
        run: terraform init -backend-config=backend.conf

      - name: Terraform apply
        working-directory: infrastructure/keycloak-config
        run: terraform apply -input=false -auto-approve
        env:
          TF_VAR_keycloak_admin_password: ${{ env.KEYCLOAK_ADMIN_PASSWORD }}
          TF_VAR_google_client_id: ${{ env.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ env.GOOGLE_CLIENT_SECRET }}
