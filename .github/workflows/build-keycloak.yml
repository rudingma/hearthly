name: Build Keycloak

on:
  push:
    branches: [main]
    paths:
      - "infrastructure/cluster-services/keycloak/deploy/**"
  workflow_dispatch:

concurrency:
  group: build-keycloak-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/hearthly-keycloak

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Keycloak version from Dockerfile
        id: version
        run: |
          KC_VERSION=$(grep 'FROM quay.io/keycloak/keycloak:' infrastructure/cluster-services/keycloak/deploy/Dockerfile | head -1 | sed 's/.*keycloak:\([^ ]*\).*/\1/')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${KC_VERSION}-sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "kc_version=${KC_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build (local)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infrastructure/cluster-services/keycloak/deploy/Dockerfile
          load: true
          push: false
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha,scope=hearthly-keycloak
          cache-to: type=gha,scope=hearthly-keycloak,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        env:
          TRIVY_PLATFORM: linux/arm64
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.version.outputs.tag }}
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Push
        run: |
          docker push ${{ env.IMAGE }}:${{ steps.version.outputs.tag }}
          docker push ${{ env.IMAGE }}:latest

      - name: Update image tag in Helm values
        run: |
          sed -i "s|^\(\s*\)tag:.*|\\1tag: \"${{ steps.version.outputs.tag }}\"|" infrastructure/cluster-services/keycloak/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infrastructure/cluster-services/keycloak/values.yaml
          git diff --cached --quiet || git commit -m "deploy: update keycloak image to ${{ steps.version.outputs.tag }}"
          git push
