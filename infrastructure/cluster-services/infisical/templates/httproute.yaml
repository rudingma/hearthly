{{- if .Values.httproute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: infisical
  labels:
    app.kubernetes.io/name: infisical
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure-secrets
  hostnames:
    - secrets.hearthly.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: infisical-infisical-standalone-infisical
          port: 8080
{{- end }}
