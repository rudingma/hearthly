{{- if .Values.route.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Chart.Name }}
  labels:
    {{- include "infisical.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.route.gateway.name }}
      namespace: {{ .Values.route.gateway.namespace }}
      sectionName: {{ .Values.route.sectionName }}
  hostnames:
    - {{ .Values.route.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
          # Service name from upstream infisical-standalone sub-chart.
          # Not affected by fullnameOverride (only overrides pod names).
        - name: infisical-infisical-standalone-infisical
          port: 8080
{{- end }}
