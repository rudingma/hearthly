apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hearthly-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:rudingma/hearthly.git
    targetRevision: main
    path: apps/hearthly-app/deploy/chart
  destination:
    server: https://kubernetes.default.svc
    namespace: hearthly
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
