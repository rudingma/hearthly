apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds
  namespace: argocd
  # Sync before route consumers (HTTPRoutes live in app charts) so a cold
  # bootstrap installs the CRDs first.
  annotations:
    argocd.argoproj.io/sync-wave: '-2'
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/rudingma/hearthly.git
    targetRevision: main
    path: infrastructure/cluster-services/gateway-api-crds
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system # cluster-scoped resources; namespace is ignored
  syncPolicy:
    automated:
      # prune INTENTIONALLY false: these CRDs are load-bearing for ingress.
      # Auto-pruning would cascade-delete every Gateway/HTTPRoute object and
      # take ingress down. Removal must be a deliberate, manual operation.
      prune: false
      selfHeal: true
    syncOptions:
      # CRDs exceed the client-side-apply annotation size limit.
      - ServerSideApply=true
