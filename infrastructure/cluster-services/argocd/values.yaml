## ArgoCD Helm chart values for Hearthly
## Chart: argo/argo-cd v9.4.17 (ArgoCD v3.3.6)
##
## Single-replica by deliberate decision (D.3 / Option B, issue #131). HA would
## only protect against one ArgoCD pod dying (self-heals anyway) — not the
## failure modes that actually take the cluster down (dead CSI, full disk, dead
## CP). Resilience comes from the cold-bootstrap runbook, not in-cluster
## redundancy. Recovery: docs/runbooks/argocd-cold-bootstrap.md

global:
  domain: argocd.hearthly.dev

# Run behind Traefik without ArgoCD's own TLS (Traefik handles it)
configs:
  params:
    server.insecure: true
  # Read-only API account for the deploy workflow's ArgoCD revision check (D.4).
  # apiKey only (no UI login). Generate its token once after this syncs:
  #   argocd account generate-token --account deploy-verify
  # then store it as the GitHub repo secret ARGOCD_TOKEN.
  cm:
    accounts.deploy-verify: apiKey
  # Least-privilege: deploy-verify may only `get` applications (the verify job
  # reads status.sync.revision/health). admin keeps full access via the built-in
  # role; policy.default stays empty (no blanket grant).
  rbac:
    policy.csv: |
      p, role:deploy-verify, applications, get, */*, allow
      g, deploy-verify, role:deploy-verify

# Disable components we don't need yet
dex:
  enabled: false
notifications:
  enabled: false

# Resource limits for small cluster
controller:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: '1'
      memory: 2Gi

server:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  ingress:
    enabled: false
  httproute:
    enabled: true
    parentRefs:
      - name: traefik-gateway
        namespace: traefik
        sectionName: websecure-argocd
    hostnames:
      - argocd.hearthly.dev

repoServer:
  env:
    - name: ARGOCD_EXEC_TIMEOUT
      value: '180s'
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
