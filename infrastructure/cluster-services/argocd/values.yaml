## ArgoCD Helm chart values for Hearthly
## Chart: argo/argo-cd v9.4.17 (ArgoCD v3.3.6)

global:
  domain: argocd.hearthly.dev

# Run behind Traefik without ArgoCD's own TLS (Traefik handles it)
configs:
  params:
    server.insecure: true

# Disable components we don't need yet
dex:
  enabled: false
notifications:
  enabled: false

# Resource limits for small cluster
controller:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

server:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls: true

repoServer:
  env:
    - name: ARGOCD_EXEC_TIMEOUT
      value: "180s"
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
