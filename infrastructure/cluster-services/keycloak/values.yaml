## Keycloak identity provider for Hearthly
## Optimized image: ghcr.io/rudingma/hearthly-keycloak

replicaCount: 1

image:
  repository: ghcr.io/rudingma/hearthly-keycloak
  tag: "26.3.3-sha-ae79ff6"
  pullPolicy: IfNotPresent

service:
  httpPort: 8080
  managementPort: 9000

ingress:
  enabled: true
  host: auth.hearthly.dev

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

keycloak:
  hostname: "https://auth.hearthly.dev"
  db:
    host: "keycloak-db-rw.keycloak.svc.cluster.local"
    port: "5432"
    database: "keycloak"
    existingSecret: "keycloak-db-app"
  admin:
    username: "admin"
    existingSecret: "keycloak-admin-credentials"
    passwordKey: "admin-password"
