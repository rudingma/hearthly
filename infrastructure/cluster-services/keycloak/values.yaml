## Keycloak identity provider for Hearthly
## Official image: quay.io/keycloak/keycloak 26.3.3

replicaCount: 1

image:
  repository: quay.io/keycloak/keycloak
  tag: "26.3.3"
  pullPolicy: IfNotPresent

service:
  httpPort: 8080
  managementPort: 9000

ingress:
  enabled: true
  host: auth.hearthly.dev

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 768Mi

keycloak:
  hostname: "https://auth.hearthly.dev"
  db:
    host: "keycloak-db-rw.keycloak.svc.cluster.local"
    port: "5432"
    database: "keycloak"
    existingSecret: "keycloak-db-app"
  admin:
    username: "admin"
    existingSecret: "keycloak-admin-credentials"
    passwordKey: "admin-password"
