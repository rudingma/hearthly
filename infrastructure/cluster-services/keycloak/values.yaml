## Keycloak identity provider for Hearthly
## Optimized image: ghcr.io/rudingma/hearthly-keycloak

replicaCount: 1

image:
  repository: ghcr.io/rudingma/hearthly-keycloak
  tag: '26.5.5-sha-74bd012'
  pullPolicy: IfNotPresent

service:
  httpPort: 8080
  managementPort: 9000

route:
  enabled: true
  host: auth.hearthly.dev
  sectionName: websecure-auth
  gateway:
    name: traefik-gateway
    namespace: traefik

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: '1'
    memory: 1Gi

keycloak:
  hostname: 'https://auth.hearthly.dev'
  db:
    host: 'keycloak-db-rw.keycloak.svc.cluster.local'
    port: '5432'
    database: 'keycloak'
    existingSecret: 'keycloak-db-app'
  admin:
    username: 'admin'
    existingSecret: 'keycloak-admin-credentials'
    passwordKey: 'admin-password'

backup:
  enabled: true
  schedule: '0 3 * * *' # Daily at 03:00 UTC (1h after app backup)
  images:
    dump: postgres:18-alpine
    upload: amazon/aws-cli:2.27.31
  s3:
    bucket: hearthly-backups
    endpoint: https://nbg1.your-objectstorage.com
    region: nbg1
