apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: keycloak-db
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: keycloak-db
  policyTypes:
    - Ingress
    - Egress
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow egress to the K8s API server. The CNPG instance manager watches its
    # Cluster CR via the API server; without this it crash-loops on startup
    # ("dial 10.43.0.1:443: connection refused" under default-deny) — root cause
    # of the 2026-05 outage recovery block. kube-router evaluates egress AFTER
    # kube-proxy DNAT, so both the ClusterIP (pre-DNAT) and the control-plane
    # node IP (post-DNAT) are required. See issue #128 and infrastructure/CLAUDE.md.
    - to:
        - ipBlock:
            cidr: {{ .Values.apiServer.clusterIP }}/32
        - ipBlock:
            cidr: {{ .Values.apiServer.nodeIP }}/32
      ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
  ingress:
    # Allow intra-cluster replication: standby -> primary for pg_basebackup +
    # streaming replication on 5432. CNPG instances all carry the label
    # cnpg.io/cluster=keycloak-db. Without this the replica join hangs on
    # "dial keycloak-db-rw:5432: connection refused" under default-deny —
    # required once instances>1 (HA, architecture plan A.2). See issue #131.
    - from:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: keycloak-db
      ports:
        - port: 5432
          protocol: TCP
    # Allow traffic from Keycloak (PostgreSQL queries)
    - from:
        - podSelector:
            matchLabels:
              {{- include "keycloak.selectorLabels" . | nindent 14 }}
      ports:
        - port: 5432
          protocol: TCP
    # Allow traffic from CNPG operator (management + status)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - port: 5432
          protocol: TCP
        - port: 8000
          protocol: TCP
    # Allow traffic from Prometheus (metrics)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9187
          protocol: TCP
