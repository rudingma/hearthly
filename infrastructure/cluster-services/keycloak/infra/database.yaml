apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: keycloak-db
  namespace: keycloak
spec:
  instances: 2

  # Async replication: write availability over zero-RPO (see hearthly-db).
  # Default minSync/maxSync = 0 is async; stated explicitly. See issue #131.
  minSyncReplicas: 0
  maxSyncReplicas: 0

  postgresql:
    parameters:
      shared_buffers: '64MB'
      max_connections: '30'

  storage:
    size: 5Gi
    storageClass: hcloud-volumes

  resources:
    requests:
      memory: '128Mi'
      cpu: '100m'
    limits:
      memory: '256Mi'
      cpu: '500m'

  bootstrap:
    initdb:
      database: keycloak
      owner: keycloak

  # Keep the two instances on different nodes (single node loss / kured drain
  # never takes the cluster down). See hearthly-db / architecture plan A.2.
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
