## Infrastructure monitoring for Hearthly
## Umbrella chart wrapping kube-prometheus-stack v82.16.0
## Cluster/infra monitoring only. App observability (OTel) in Observability milestone.

kube-prometheus-stack:

  # --- Grafana ---
  grafana:
    ingress:
      enabled: false
    route:
      main:
        enabled: true
        parentRefs:
          - name: traefik-gateway
            namespace: traefik
            sectionName: websecure-grafana
        hostnames:
          - grafana.hearthly.dev
        matches:
          - path:
              type: PathPrefix
              value: /

    # Default admin: admin / prom-operator — change on first login.
    # Grafana stores the new password in its SQLite DB (PVC-backed).

    # Disable the 23 bundled generic dashboards.
    # We provision a single custom "Hearthly Overview" dashboard instead.
    defaultDashboardsEnabled: false

    # Sidecar picks up dashboards from ConfigMaps with this label.
    # allowDeletion: sidecar removes dashboards no longer in ConfigMaps.
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        allowDeletion: true

    # Recreate strategy required: hcloud-volumes are ReadWriteOnce,
    # so RollingUpdate fails (new pod can't mount PVC while old holds it).
    deploymentStrategy:
      type: Recreate

    persistence:
      enabled: true
      storageClassName: hcloud-volumes
      size: 2Gi

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 384Mi

  # --- Prometheus ---
  prometheus:
    prometheusSpec:
      retention: 10d
      retentionSize: "4GB"
      scrapeInterval: 30s
      evaluationInterval: 30s

      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi

      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: hcloud-volumes
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi

      # Discover ALL PrometheusRules and ServiceMonitors, not just those
      # with a release label matching this Helm chart. Required for custom
      # rules in wrapper chart templates and cross-namespace ServiceMonitors.
      ruleSelectorNilUsesHelmValues: false
      serviceMonitorSelectorNilUsesHelmValues: false

  # --- Alertmanager → ntfy.sh via alertmanager-ntfy sidecar ---
  alertmanager:
    enabled: true

    alertmanagerSpec:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi

      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: hcloud-volumes
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi

      # alertmanager-ntfy sidecar — transforms Alertmanager webhooks into
      # clean ntfy.sh notifications with priority mapping and emoji tags.
      containers:
        - name: ntfy-proxy
          image: ghcr.io/alexbakker/alertmanager-ntfy:1.2.1
          args:
            - "--configs"
            - "/config/config.yml"
            - "--ntfy-topic"
            - "$(NTFY_TOPIC)"
          env:
            - name: NTFY_TOPIC
              valueFrom:
                secretKeyRef:
                  name: ntfy-topic
                  key: NTFY_TOPIC
          ports:
            - name: ntfy-hook
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: ntfy-config
              mountPath: /config
              readOnly: true

      volumes:
        - name: ntfy-config
          configMap:
            name: alertmanager-ntfy-config

    config:
      global:
        resolve_timeout: 5m

      route:
        receiver: ntfy
        group_by: ['alertname', 'namespace']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        routes:
          # Silence Watchdog (deadman's switch) — fires continuously when
          # everything is healthy. Without this route, it would spam ntfy
          # every repeat_interval.
          - receiver: 'null'
            matchers:
              - alertname = "Watchdog"
          - receiver: ntfy
            matchers:
              - severity = critical
            group_interval: 5m
            repeat_interval: 1h

      inhibit_rules:
        # Default severity cascading — prevent duplicate critical + warning
        # notifications for the same alert.
        - source_matchers:
            - 'severity = critical'
          target_matchers:
            - 'severity =~ warning|info'
          equal: ['namespace', 'alertname']
        - source_matchers:
            - 'severity = warning'
          target_matchers:
            - 'severity = info'
          equal: ['namespace', 'alertname']
        - source_matchers:
            - 'alertname = InfoInhibitor'
          target_matchers:
            - 'severity = info'
          equal: ['namespace']
        - target_matchers:
            - 'alertname = InfoInhibitor'
        # Node-down cascade — suppress pod/target alerts when the node itself
        # is unreachable (one root-cause notification instead of 10+).
        - source_matchers:
            - alertname = NodeNotReady
          target_matchers:
            - alertname =~ "KubePodCrashLooping|KubePodNotReady|TargetDown"
          equal: ['node']

      receivers:
        - name: ntfy
          webhook_configs:
            - url: 'http://localhost:8000/hook'
              send_resolved: true
        - name: 'null'

  # --- k3s: disable components that bind to 127.0.0.1 ---
  # k3s runs controller-manager, scheduler, and proxy inside the
  # single k3s server process. They're not reachable by ServiceMonitors
  # without changing k3s startup flags. Embedded etcd doesn't expose
  # the standard metrics endpoint either.
  kubeEtcd:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false

  # Not applicable
  windowsMonitoring:
    enabled: false
  thanosRuler:
    enabled: false

  # --- Prometheus Operator ---
  prometheusOperator:
    # Admission webhooks validate PrometheusRule CRDs at apply time,
    # catching PromQL syntax errors before they silently fail at runtime.
    # Using deployment mode (not patch/hook mode) to avoid ArgoCD PreSync blocks.
    admissionWebhooks:
      enabled: true
      patch:
        enabled: false
      deployment:
        enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  # --- Node exporter (runs on every node) ---
  prometheus-node-exporter:
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

  # --- kube-state-metrics ---
  kube-state-metrics:
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
