## Infrastructure monitoring for Hearthly
## Umbrella chart wrapping kube-prometheus-stack v82.16.0
## Cluster/infra monitoring only. App observability (OTel) in Observability milestone.

kube-prometheus-stack:

  # --- Grafana ---
  grafana:
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - grafana.hearthly.dev
      tls:
        - secretName: grafana-hearthly-dev-tls
          hosts:
            - grafana.hearthly.dev

    # Default admin: admin / prom-operator — change on first login.
    # Grafana stores the new password in its SQLite DB (PVC-backed).

    # Disable the 23 bundled generic dashboards.
    # We provision a single custom "Hearthly Overview" dashboard instead.
    defaultDashboardsEnabled: false

    # Sidecar picks up dashboards from ConfigMaps with this label.
    # allowDeletion: sidecar removes dashboards no longer in ConfigMaps.
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        allowDeletion: true

    # Recreate strategy required: hcloud-volumes are ReadWriteOnce,
    # so RollingUpdate fails (new pod can't mount PVC while old holds it).
    deploymentStrategy:
      type: Recreate

    persistence:
      enabled: true
      storageClassName: hcloud-volumes
      size: 2Gi

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 384Mi

  # --- Prometheus ---
  prometheus:
    prometheusSpec:
      retention: 10d
      retentionSize: "4GB"
      scrapeInterval: 30s
      evaluationInterval: 30s

      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi

      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: hcloud-volumes
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi

  # --- Alertmanager (disabled until custom alerting rules are needed) ---
  alertmanager:
    enabled: false

  # --- k3s: disable components that bind to 127.0.0.1 ---
  # k3s runs controller-manager, scheduler, and proxy inside the
  # single k3s server process. They're not reachable by ServiceMonitors
  # without changing k3s startup flags. Embedded etcd doesn't expose
  # the standard metrics endpoint either.
  kubeEtcd:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false

  # Not applicable
  windowsMonitoring:
    enabled: false
  thanosRuler:
    enabled: false

  # --- Prometheus Operator ---
  prometheusOperator:
    # Disable admission webhooks.
    # The chart's webhook hook resources (Jobs, RBAC) use Helm hook
    # annotations that ArgoCD translates to PreSync hooks, blocking
    # the entire sync. Webhooks only validate PrometheusRule CRDs —
    # not needed until we write custom alerting rules.
    admissionWebhooks:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  # --- Node exporter (runs on every node) ---
  prometheus-node-exporter:
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

  # --- kube-state-metrics ---
  kube-state-metrics:
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
