apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: control-plane-health
  namespace: {{ .Release.Namespace }}
spec:
  groups:
    - name: control-plane
      rules:
        - alert: NodeOOMKill
          expr: >-
            increase(node_vmstat_oom_kill[1h])
            * on(instance) group_left(nodename)
            node_uname_info > 0
          labels:
            severity: critical
          annotations:
            summary: >-
              OOM kill on node {{ "{{" }} $labels.nodename {{ "}}" }}
            description: >-
              The kernel OOM killer was invoked on node
              {{ "{{" }} $labels.nodename {{ "}}" }} in the last hour.
              Check which process was killed via dmesg or journal.
              If this is the control plane node, consider upgrading
              from CAX11 to CAX21.

        - alert: ControlPlaneHighMemory
          expr: >-
            (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
            * on(instance) group_left(nodename)
            node_uname_info{nodename=~"k3s-control-plane.*"} > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: >-
              Control plane memory above 90%
              ({{ "{{" }} $value | humanizePercentage {{ "}}" }})
            description: >-
              Memory usage on control plane node
              {{ "{{" }} $labels.nodename {{ "}}" }} has been above 90%
              for 5 minutes. Sustained pressure increases OOM kill risk.
              Consider upgrading to a larger node (CAX21).
