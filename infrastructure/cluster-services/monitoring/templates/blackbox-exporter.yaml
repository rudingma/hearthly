# Synthetic ingress probing — the 2026-05 outage was SILENT in-cluster: Traefik
# built zero HTTP routers and every host 404'd, but nothing alerted. blackbox-exporter
# probes each public host end-to-end (DNS -> LB -> Traefik -> service) so a broken
# ingress fires loudly via the existing Alertmanager -> ntfy path. See issue #131.
apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-exporter
  namespace: {{ .Release.Namespace }}
data:
  blackbox.yml: |
    modules:
      ingress_http:
        prober: http
        timeout: 8s
        http:
          method: GET
          # "Alive" codes: a routed host returns one of these. A broken ingress
          # (no Traefik router) returns 404, or 5xx/timeout -> probe_success=0.
          valid_status_codes: [200, 301, 302, 303, 307, 308, 401, 403]
          fail_if_not_ssl: true
          preferred_ip_protocol: ip4
          ip_protocol_fallback: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackbox-exporter
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: blackbox-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blackbox-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blackbox-exporter
      annotations:
        checksum/config: {{ .Files.Get "templates/blackbox-exporter.yaml" | sha256sum | trunc 16 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: blackbox-exporter
          image: quay.io/prometheus/blackbox-exporter:v0.25.0
          args:
            - --config.file=/etc/blackbox/blackbox.yml
          ports:
            - name: http
              containerPort: 9115
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
          readinessProbe:
            httpGet:
              path: /-/healthy
              port: http
          volumeMounts:
            - name: config
              mountPath: /etc/blackbox
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: blackbox-exporter
---
apiVersion: v1
kind: Service
metadata:
  name: blackbox-exporter
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: blackbox-exporter
spec:
  selector:
    app.kubernetes.io/name: blackbox-exporter
  ports:
    - name: http
      port: 9115
      targetPort: http
