# CNPG: allow intra-namespace communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-intra-namespace
  namespace: cnpg-system
  labels:
    {{- include "network-policies.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# CNPG operator: allow egress to database namespaces (5432 + 8000)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-db-egress
  namespace: cnpg-system
  labels:
    {{- include "network-policies.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: hearthly
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
      ports:
        - port: 5432
          protocol: TCP
        - port: 8000
          protocol: TCP
---
# CNPG operator: allow egress to K8s API server
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-api-egress
  namespace: cnpg-system
  labels:
    {{- include "network-policies.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: {{ .Values.apiServer.clusterIP }}/32
      ports:
        - port: 443
          protocol: TCP
---
# CNPG operator: allow ingress from Prometheus (metrics on 8080)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-prometheus-ingress
  namespace: cnpg-system
  labels:
    {{- include "network-policies.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cloudnative-pg
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
