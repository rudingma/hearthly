{{- if .Values.ingress.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Chart.Name }}
  labels:
    {{- include "hearthly-app.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure-app
  hostnames:
    - {{ .Values.ingress.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Chart.Name }}
          port: {{ .Values.service.port }}
{{- end }}
