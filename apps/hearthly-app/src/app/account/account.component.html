<app-header heading="Account" [showBack]="true" />
<main tabindex="-1" class="account-main">
  <app-page-container>
    <div class="profile-section">
      <app-avatar
        size="lg"
        [pictureUrl]="pictureUrl()"
        [initials]="initials()"
      />
      <h2 class="profile-name">{{ userName() }}</h2>
      <p class="profile-email">{{ userEmail() }}</p>
    </div>

    <ul class="list">
      <li appListItem>
        <lucide-icon [img]="UsersIcon" [size]="20" />
        <span>Family</span>
      </li>
      <li appListItem>
        <lucide-icon [img]="SettingsIcon" [size]="20" />
        <span>Settings</span>
      </li>
      <li appListItem>
        <lucide-icon [img]="HelpCircleIcon" [size]="20" />
        <span>Help</span>
      </li>
    </ul>

    <div class="sign-out-section">
      <button
        appButton
        variant="secondary"
        [fullWidth]="true"
        data-testid="sign-out-button"
        (click)="signOut()"
      >
        <lucide-icon [img]="LogOutIcon" [size]="20" />
        <span>Sign out</span>
      </button>
    </div>
  </app-page-container>
</main>
