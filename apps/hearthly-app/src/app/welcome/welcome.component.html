<main tabindex="-1" class="welcome-main">
  <app-page-container mode="constrained">
    <div class="welcome-logo">
      <svg
        width="80"
        height="80"
        viewBox="0 0 100 100"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <path
          d="M14 48L50 14L86 48V88H14V48Z"
          stroke="var(--color-hearth-terracotta)"
          stroke-width="5.5"
          stroke-linejoin="round"
          fill="none"
        />
        <path
          d="M8 50L50 10L92 50"
          stroke="var(--color-hearth-terracotta)"
          stroke-width="5.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"
        />
        <rect
          x="37"
          y="54"
          width="26"
          height="34"
          rx="13"
          fill="var(--color-terracotta-tint)"
          opacity="0.6"
        />
        <rect
          x="42"
          y="58"
          width="16"
          height="30"
          rx="8"
          fill="var(--color-hearth-terracotta)"
          opacity="0.3"
        />
      </svg>
    </div>
    <h1 class="welcome-title">Hearthly</h1>
    <p class="welcome-tagline">Your household, together</p>

    <div class="welcome-buttons">
      <button
        type="button"
        class="google-sign-in"
        data-testid="sign-in-google"
        (click)="signInWithGoogle()"
      >
        <svg
          class="google-icon"
          viewBox="0 0 18 18"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z"
            fill="#4285F4"
          />
          <path
            d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z"
            fill="#34A853"
          />
          <path
            d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z"
            fill="#FBBC05"
          />
          <path
            d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 2.58 9 3.58Z"
            fill="#EA4335"
          />
        </svg>
        <span>Sign in with Google</span>
      </button>

      @if (showPasswordAuth) {
      <div class="welcome-divider"><span>Or sign in with email</span></div>
      <button
        appButton
        variant="primary"
        [fullWidth]="true"
        type="button"
        data-testid="sign-in-password"
        (click)="signIn()"
      >
        Sign In
      </button>
      }
    </div>
  </app-page-container>
</main>
