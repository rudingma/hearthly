@if (auth.error()) {
  <div>
    <p>Could not load your profile. The server may be unavailable.</p>
    <button (click)="auth.retry()">Retry</button>
  </div>
} @else {
  <h1>Welcome, {{ auth.currentUser()?.name }}</h1>
  <p>{{ auth.currentUser()?.email }}</p>
  <button (click)="auth.logout()">Log out</button>
}
