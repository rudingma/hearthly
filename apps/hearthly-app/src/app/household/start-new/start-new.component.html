<app-page-container>
  <div class="start-new">
    <h1 class="start-new__title">Create Your Household</h1>
    <p class="start-new__caption">
      Choose something your household will recognize.
    </p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="start-new__field">
        <label class="start-new__label" for="household-name"
          >Household name</label
        >
        <input
          id="household-name"
          type="text"
          formControlName="name"
          maxlength="80"
          #nameInput
          autocomplete="off"
          class="start-new__input"
          data-testid="household-name-input"
        />
      </div>

      @if (submitError()) {
      <p class="start-new__error" role="alert">{{ submitError() }}</p>
      }

      <button
        type="submit"
        appButton
        variant="primary"
        [fullWidth]="true"
        [disabled]="form.invalid || isSubmitting() || hasSucceeded()"
        data-testid="household-create-submit"
      >
        Create Household
      </button>
    </form>
  </div>
</app-page-container>
