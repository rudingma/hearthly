<app-page-container>
  <main tabindex="-1" class="start-hero">
    <div class="start-hero__icon" aria-hidden="true">
      <lucide-icon [img]="HouseIcon" [size]="48"></lucide-icon>
    </div>
    <h1 class="start-hero__title">Welcome to Hearthly.</h1>
    <p class="start-hero__body">
      Hearthly organizes shared household life. Start by creating your household
      or joining one.
    </p>
    <div class="start-hero__actions">
      <a
        appButton
        variant="primary"
        [fullWidth]="true"
        routerLink="/app/start/new"
        data-testid="household-start-create-cta"
      >
        Create a Household
      </a>
      <a
        appButton
        variant="secondary"
        [fullWidth]="true"
        routerLink="/app/join"
        data-testid="household-start-join-cta"
      >
        I Have an Invite Code
      </a>
    </div>
  </main>
</app-page-container>
