<header class="app-header">
  <div class="app-header__leading">
    @if (showBack()) {
    <button
      appButton
      variant="ghost"
      type="button"
      data-testid="header-back"
      aria-label="Back"
      (click)="back()"
    >
      <lucide-icon [img]="ArrowLeftIcon" [size]="20" />
    </button>
    } @else {
    <!--
      Brand mark on flat (tab-root) routes. Fills the 40×40 leading slot
      that would otherwise feel empty, especially on mobile where the
      SideNav wordmark isn't visible. See DESIGN.md §4.3 AppHeader.
    -->
    <app-brand-mark class="app-header__brand" variant="compact" />
    }
  </div>
  <h1 class="app-header__title">{{ heading() }}</h1>
  <div class="app-header__trailing">
    <a
      appButton
      variant="ghost"
      routerLink="/app/account"
      aria-label="Account"
      data-testid="header-account"
    >
      <app-avatar
        size="sm"
        [pictureUrl]="pictureUrl()"
        [initials]="initials()"
      />
    </a>
  </div>
</header>
