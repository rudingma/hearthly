<ion-split-pane contentId="main-content" when="lg">
  <!-- Desktop sidebar (visible on screens > 992px) -->
  <ion-menu contentId="main-content" type="overlay">
    <ion-content>
      <ion-list lines="none">
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/app/home" routerLinkActive="selected">
            <ion-icon name="home-outline" slot="start"></ion-icon>
            <ion-label>Home</ion-label>
          </ion-item>
          <ion-item routerLink="/app/budget" routerLinkActive="selected">
            <ion-icon name="wallet-outline" slot="start"></ion-icon>
            <ion-label>Budget</ion-label>
          </ion-item>
          <ion-item routerLink="/app/lists" routerLinkActive="selected">
            <ion-icon name="list-outline" slot="start"></ion-icon>
            <ion-label>Lists</ion-label>
          </ion-item>
          <ion-item routerLink="/app/calendar" routerLinkActive="selected">
            <ion-icon name="calendar-outline" slot="start"></ion-icon>
            <ion-label>Calendar</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
      <ion-list lines="none" class="sidebar-bottom">
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/app/account" routerLinkActive="selected">
            <ion-icon name="person-outline" slot="start"></ion-icon>
            <ion-label>Account</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>

  <!-- Main content area -->
  <div class="ion-page" id="main-content">
    <app-header />
    <ion-tabs>
      <ion-tab-bar slot="bottom">
        <ion-tab-button tab="home">
          <ion-icon name="home-outline"></ion-icon>
          <ion-label>Home</ion-label>
        </ion-tab-button>
        <ion-tab-button tab="budget">
          <ion-icon name="wallet-outline"></ion-icon>
          <ion-label>Budget</ion-label>
        </ion-tab-button>
        <ion-tab-button tab="lists">
          <ion-icon name="list-outline"></ion-icon>
          <ion-label>Lists</ion-label>
        </ion-tab-button>
        <ion-tab-button tab="calendar">
          <ion-icon name="calendar-outline"></ion-icon>
          <ion-label>Calendar</ion-label>
        </ion-tab-button>
      </ion-tab-bar>
    </ion-tabs>
  </div>
</ion-split-pane>
