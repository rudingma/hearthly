replicaCount: 2

image:
  repository: ghcr.io/rudingma/hearthly-api
  tag: sha-4798723cdd1acc1a0e2c1f5acbb949bc6977197b
  pullPolicy: IfNotPresent

service:
  port: 3000

ingress:
  enabled: true
  host: api.hearthly.dev

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  PORT: "3000"

backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 02:00 UTC
  images:
    dump: postgres:18-alpine
    upload: amazon/aws-cli:2.27.31
  # Retention handled by S3 lifecycle policy on the bucket (30-day expiry).
  s3:
    bucket: hearthly-backups
    endpoint: https://nbg1.your-objectstorage.com
    region: nbg1
