replicaCount: 2

image:
  repository: ghcr.io/rudingma/hearthly-api
  tag: sha-4375691b084b172e2503560794ece8aa7d28b0c9
  pullPolicy: IfNotPresent

service:
  port: 3000

ingress:
  enabled: true
  host: api.hearthly.dev

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  PORT: "3000"

backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 02:00 UTC
  # Two-container approach: postgres:18-alpine for pg_dump (init),
  # amazon/aws-cli for S3 upload (main). See cronjob template.
  retentionDays: 30
  s3:
    bucket: hearthly-backups
    endpoint: https://nbg1.your-objectstorage.com
    region: nbg1
