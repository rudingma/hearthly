replicaCount: 2

image:
  repository: ghcr.io/rudingma/hearthly-api
  tag: sha-d6adea69b7764cc338b5d3a20a27c72735b3041b
  pullPolicy: IfNotPresent

service:
  port: 3000

route:
  enabled: true
  host: api.hearthly.dev
  sectionName: websecure-api
  gateway:
    name: traefik-gateway
    namespace: traefik

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  PORT: '3000'
  NODE_ENV: 'production'
  CORS_ORIGIN: 'https://hearthly.dev'
  KEYCLOAK_ISSUER_URL: 'https://auth.hearthly.dev/realms/hearthly'
  KEYCLOAK_CLIENT_ID: 'hearthly-app'

backup:
  enabled: true
  schedule: '0 2 * * *' # Daily at 02:00 UTC
  images:
    dump: postgres:18-alpine
    upload: amazon/aws-cli:2.27.31
  # Retention handled by S3 lifecycle policy on the bucket (30-day expiry).
  s3:
    bucket: hearthly-backups
    endpoint: https://nbg1.your-objectstorage.com
    region: nbg1
