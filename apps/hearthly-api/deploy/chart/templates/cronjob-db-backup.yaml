{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Chart.Name }}-db-backup
  labels:
    {{- include "hearthly-api.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            {{- include "hearthly-api.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: db-backup
        spec:
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: OnFailure
          volumes:
            - name: backup-data
              emptyDir: {}
          initContainers:
            # Step 1: pg_dump (postgres image has pg_dump, runs as postgres user)
            - name: dump
              image: postgres:18-alpine
              securityContext:
                runAsUser: 70
                runAsGroup: 70
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: hearthly-db-app
                      key: uri
              command:
                - /bin/sh
                - -c
                - |
                  set -eo pipefail
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  echo "${TIMESTAMP}" > /backup/timestamp
                  FILENAME="hearthly-db-${TIMESTAMP}.sql.gz"
                  echo "Dumping database: ${FILENAME}"
                  pg_dump "${DATABASE_URL}" | gzip > "/backup/${FILENAME}"

                  FILESIZE=$(stat -c%s "/backup/${FILENAME}" 2>/dev/null || echo 0)
                  if [ "$FILESIZE" -lt 100 ]; then
                    echo "ERROR: Backup file too small (${FILESIZE} bytes). Aborting."
                    exit 1
                  fi
                  echo "Dump complete: $(du -h /backup/${FILENAME} | cut -f1)"
              volumeMounts:
                - name: backup-data
                  mountPath: /backup
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          containers:
            # Step 2: Upload to S3 (aws-cli image has aws command)
            - name: upload
              image: amazon/aws-cli:2.27.31
              securityContext:
                runAsUser: 1000
                runAsGroup: 1000
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: hearthly-managed-secrets
                      key: S3_ACCESS_KEY
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: hearthly-managed-secrets
                      key: S3_SECRET_KEY
                - name: S3_BUCKET
                  value: {{ .Values.backup.s3.bucket | quote }}
                - name: S3_ENDPOINT
                  value: {{ .Values.backup.s3.endpoint | quote }}
                - name: S3_REGION
                  value: {{ .Values.backup.s3.region | quote }}
                - name: RETENTION_DAYS
                  value: {{ .Values.backup.retentionDays | quote }}
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(cat /backup/timestamp)
                  FILENAME="hearthly-db-${TIMESTAMP}.sql.gz"

                  echo "Uploading /backup/${FILENAME} to s3://${S3_BUCKET}/"
                  aws s3 cp "/backup/${FILENAME}" "s3://${S3_BUCKET}/${FILENAME}" \
                    --endpoint-url "${S3_ENDPOINT}" \
                    --region "${S3_REGION}"
                  echo "Upload complete"

                  echo "Cleaning up backups older than ${RETENTION_DAYS} days"
                  CUTOFF=$(date -d "-${RETENTION_DAYS} days" +%Y%m%d)
                  aws s3 ls "s3://${S3_BUCKET}/" \
                    --endpoint-url "${S3_ENDPOINT}" \
                    --region "${S3_REGION}" > /tmp/backup-list.txt || true

                  while read -r line; do
                    FILE=$(echo "$line" | awk '{print $4}')
                    if [ -n "$FILE" ]; then
                      FILE_DATE=$(echo "$FILE" | grep -oP '\d{8}' | head -1)
                      if [ -n "$FILE_DATE" ] && [ "$FILE_DATE" -lt "$CUTOFF" ]; then
                        echo "Deleting old backup: ${FILE}"
                        aws s3 rm "s3://${S3_BUCKET}/${FILE}" \
                          --endpoint-url "${S3_ENDPOINT}" \
                          --region "${S3_REGION}" || true
                      fi
                    fi
                  done < /tmp/backup-list.txt
                  echo "Backup complete"
              volumeMounts:
                - name: backup-data
                  mountPath: /backup
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
{{- end }}
